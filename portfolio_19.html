<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
    // PDF.js 워커 연결
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    
    // 실제 보여줄 PDF 파일 경로 (파일 이름과 경로가 맞는지 꼭 확인해 주세요!)
    const pdfUrl = 'images/files/AIHackathon/CiscoIT_Hackathon2025.pdf'; 
    const container = document.getElementById('pdf-container');

    // PDF 로드 및 전체 페이지 차례대로 렌더링
    pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
        const totalPagesToShow = pdf.numPages;
        let chain = Promise.resolve();

        for (let pageNum = 1; pageNum <= totalPagesToShow; pageNum++) {
            chain = chain.then(() => pdf.getPage(pageNum).then(page => {
                const canvas = document.createElement('canvas');
                canvas.style.display = 'block';
                canvas.style.width = '100%';
                canvas.style.marginBottom = '20px';
                container.appendChild(canvas);

                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 1.5 }); // 선명도 1.5배

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                return page.render(renderContext).promise;
            }));
        }
    }).catch(error => {
        console.error('PDF 로딩 에러: ', error);
    });
</script>
