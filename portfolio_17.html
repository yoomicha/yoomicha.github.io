    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        // PDF 파일 경로
        const url = 'images/files/GroupingLogic/01_Grouping Logic.pdf'; 
        const container = document.getElementById('pdf-container');

        pdfjsLib.getDocument(url).promise.then(pdf => {
            // 전체 페이지 수에서 마지막 3페이지를 뺀 만큼만 지정
            const totalPagesToShow = pdf.numPages - 3;

            for (let pageNum = 1; pageNum <= totalPagesToShow; pageNum++) {
                pdf.getPage(pageNum).then(page => {
                    const canvas = document.createElement('canvas');
                    canvas.style.display = 'block';
                    canvas.style.width = '100%';
                    canvas.style.marginBottom = '20px';
                    container.appendChild(canvas);

                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 1.5 }); // 선명도 1.5배

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            }
        }).catch(error => {
            console.error('PDF 로딩 중 에러 발생: ', error);
        });
    </script>
