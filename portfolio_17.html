    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        // PDF.js 워커 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        
        // 1. 보여줄 PDF 파일 경로들 설정
        const firstPdfUrl = 'images/files/GroupingLogic/01_Grouping Logic.pdf'; 
        const secondPdfUrl = 'images/files/GroupingLogic/02_Grouping Logic.pdf'; 
        
        const container = document.getElementById('pdf-container');

        // 공통 페이지 렌더링 함수
        function renderPdfPages(pdf, totalPages) {
            let chain = Promise.resolve();

            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                chain = chain.then(() => pdf.getPage(pageNum).then(page => {
                    const canvas = document.createElement('canvas');
                    canvas.style.display = 'block';
                    canvas.style.width = '100%';
                    canvas.style.marginBottom = '20px';
                    container.appendChild(canvas);

                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 1.5 }); // 선명도 1.5배

                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    return page.render(renderContext).promise;
                }));
            }
            return chain;
        }

        // 첫 번째 PDF 로드 -> 완료 후 두 번째 PDF 연속 로드
        pdfjsLib.getDocument(firstPdfUrl).promise.then(pdf1 => {
            // 첫 번째 PDF는 마지막 3페이지 제외
            const pagesToShow1 = pdf1.numPages - 3;
            return renderPdfPages(pdf1, pagesToShow1);
        }).then(() => {
            // 첫 번째 PDF 출력이 완료되면 두 번째 PDF 로드
            return pdfjsLib.getDocument(secondPdfUrl).promise;
        }).then(pdf2 => {
            // 두 번째 PDF는 전체 페이지를 다 보여줌 (전체 출력)
            return renderPdfPages(pdf2, pdf2.numPages);
        }).catch(error => {
            console.error('PDF 로딩 중 에러 발생: ', error);
        });
    </script>
